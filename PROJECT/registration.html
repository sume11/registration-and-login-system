<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Registration Form</title>
  <link rel="stylesheet" href="styles/registration.css">
</head>
<body>

<div class="container">
    <h2>Registration Form</h2>

  <form action="php/register.php" Method="POST" onsubmit="return validateRegister()">
      <div class="form-grid">

        <div>
          <label >First Name</label>
          <input type="text" name="firstname" required>
        </div>

        <div>
          <label>Last Name</label>
          <input type="text" name="lastname" required >
        </div>

        <div>
          <label>Department</label>
          <select name="department">
            <option>Computer Science</option>
            <option>Information Technology</option>
            <option>Software Engineering</option>
          </select>
        </div>
       <div>
          <label>Username</label>
          <input type="text" name="username" required>
       </div>
      <div>
        <label>Password</label>
        <input type="password" name="password" required>
     </div>
        <div>
          <label>Gender</label>
          <div class="gender">
            <label><input type="radio" name="gender" value="male"> Male</label>
            <label><input type="radio" name="gender" value="female"> Female</label>
            <label><input type="radio" name="gender" value="other"> Other</label>
          </div>
        </div>

        <div>
          <label>Hobbies</label>
          <div class="hobbies">
            <label><input type="checkbox" name="hobbies[]" value="Reading"> Reading</label>
            <label><input type="checkbox" name="hobbies[]" value="Sport"> Sports</label>
            <label><input type="checkbox" name="hobbies[]" value="Music"> Music</label>
            <label><input type="checkbox" name="hobbies[]" value="Travel"> Travel</label>
          </div>
        </div>

        <div>
          <label>Others</label>
          <textarea  name="others"></textarea>
        </div>
      </div>
     

      <div class="buttons">
        <button type="submit" class="register">Register</button>
        <button type="reset" class="clear">Clear</button>
      </div>

    </form>
  </div>
<script>
 function validateRegister() {
    let username = document.querySelector("input[name='username']").value;
    let password = document.querySelector("input[name='password']").value;

    if (username === "" || password === "") {
        alert("Fill all required fields!");
        return false;
    }

    if (password.length < 6) {
        alert("Password must be at least 6 characters!");
        return false;
    }

    return true;
}
</script>
</body>
</html>
